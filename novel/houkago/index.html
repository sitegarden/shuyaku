<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>放課後の主役たち | SHUYAKU NOVEL</title>
  <meta name="description" content="6人のキャラクターと放課後を過ごす、プチ攻略ノベルゲームです。" />

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="game">
    <section id="titleScreen" class="screen title-screen active">
      <p class="label">SHUYAKU NOVEL</p>
      <h1>放課後の主役たち</h1>
      <p class="catch">今日、誰と帰る？</p>

      <button id="startBtn" class="main-btn">はじめる</button>
      <a href="../../" class="sub-link">ノベル一覧へ戻る</a>
    </section>

    <section id="selectScreen" class="screen select-screen">
      <p class="label">CHARACTER SELECT</p>
      <h2>攻略するキャラを選んでください</h2>

      <div id="characterGrid" class="character-grid"></div>
    </section>

    <section id="novelScreen" class="screen novel-screen">
      <div class="stage">
        <img id="characterImage" class="character-image" src="" alt="" />
      </div>

      <div class="message-box">
        <div class="name-row">
          <span id="speakerName" class="speaker-name"></span>
          <span id="lovePoint" class="love-point">好感度 0</span>
        </div>

        <p id="messageText" class="message-text"></p>

        <div id="choices" class="choices"></div>

        <button id="nextBtn" class="next-btn">次へ</button>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
