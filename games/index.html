<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>games | shuyaku.me</title>

  <link rel="icon" href="https://shuyaku.me/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://shuyaku.me/favicon.png">

  <meta property="og:site_name" content="shuyaku.me">
  <meta property="og:title" content="games | shuyaku.me">
  <meta property="og:description" content="ランキングで競えるミニゲーム">
  <meta property="og:image" content="https://shuyaku.me/ogp.png">
  <meta property="og:url" content="https://shuyaku.me/games/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="games | shuyaku.me">
  <meta name="twitter:description" content="ランキングで競えるミニゲーム">
  <meta name="twitter:image" content="https://shuyaku.me/ogp.png">

  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="siteHeader"></div>

  <main class="games-page">

    <section class="games-hero">
      <div class="games-window">
        <div class="window-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <p class="games-label">score games</p>

        <h1 id="headerTitle">
          ランキング系<br class="sp-only">ミニゲーム
        </h1>

        <p id="headerSubtitle" class="games-lead">
          好きなゲームを選んで、スコアを競え。
        </p>

        <div id="headerUserArea" class="games-user-area"></div>

        <div class="games-action-row">
          <button type="button" id="headerBackBtn" class="game-action-btn hidden">
            戻る
          </button>

          <button type="button" id="headerActionBtn" class="game-action-btn hidden">
            ランキング
          </button>
        </div>
      </div>
    </section>

    <section class="games-panel">
      <div class="games-tabs">
        <button type="button" class="games-tab active" id="tabGamesBtn">
          ゲーム
        </button>

        <button type="button" class="games-tab" id="tabRankingBtn">
          ランキング
        </button>
      </div>

      <section id="homeScreen" class="screen active">
        <div class="section-title">
          <p>select</p>
          <h2>ゲームを選ぶ</h2>
        </div>

        <p class="screen-lead">
          短時間で遊べるミニゲームをまとめています。
          ベストスコアを出して、ランキング上位を狙おう。
        </p>

        <div id="gameList" class="game-list"></div>
      </section>

      <section id="rankingScreen" class="screen">
        <div class="section-title">
          <p>ranking</p>
          <h2>ランキング</h2>
        </div>

        <p class="screen-lead">
          ゲームごとのスコアランキングを確認できます。
        </p>

        <div class="tabs ranking-tabs">
          <button type="button" data-period="week">週間</button>
          <button type="button" data-period="month">月間</button>
          <button type="button" data-period="all">全期間</button>
        </div>

        <div id="rankingArea" class="ranking-area"></div>
      </section>

      <section id="gameScreen" class="screen">
        <div id="gameContainer" class="game-container"></div>
      </section>
    </section>

  </main>

  <div id="siteFooter"></div>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="./home.js"></script>

</body>
</html>
