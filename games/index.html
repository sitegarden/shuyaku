<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>games | shuyaku.me</title>

  <link rel="icon" href="https://shuyaku.me/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://shuyaku.me/favicon.png">

  <meta property="og:site_name" content="shuyaku.me">
  <meta property="og:title" content="games | shuyaku.me">
  <meta property="og:description" content="ランキングで競えるミニゲーム">
  <meta property="og:image" content="https://shuyaku.me/ogp.png">
  <meta property="og:url" content="https://shuyaku.me/games/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="games | shuyaku.me">
  <meta name="twitter:description" content="ランキングで競えるミニゲーム">
  <meta name="twitter:image" content="https://shuyaku.me/ogp.png">

  <link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="siteHeader"></div>

  <header class="games-hero">
    <div class="games-hero-window">
      <div class="window-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <p class="games-label">score games</p>

      <h1 id="headerTitle">ランキング系ミニゲーム</h1>

      <p id="headerSubtitle">
        好きなゲームを選んで、スコアを競え。
      </p>

      <div id="headerUserArea"></div>

      <div class="games-header-actions">
        <button type="button" id="headerBackBtn" class="game-top-btn hidden">
          戻る
        </button>

        <button type="button" id="headerActionBtn" class="game-top-btn">
          ランキング
        </button>
      </div>
    </div>
  </header>

  <main class="games-main">

    <section id="homeScreen" class="screen active">
      <div class="section-title">
        <p>select</p>
        <h2>ゲームを選ぶ</h2>
      </div>

      <p class="games-lead">
        すぐ遊べる短時間ゲームをまとめています。
        ベストスコアを出して、ランキング上位を狙おう。
      </p>

      <div id="gameList"></div>
    </section>

    <section id="gameScreen" class="screen">
      <div id="gameContainer"></div>
    </section>

    <section id="rankingScreen" class="screen">
      <div class="section-title">
        <p>ranking</p>
        <h2>ランキング</h2>
      </div>

      <div class="ranking-tabs">
        <button type="button" data-period="weekly">週間</button>
        <button type="button" data-period="monthly">月間</button>
        <button type="button" data-period="all">全期間</button>
      </div>

      <div id="rankingArea"></div>
    </section>

    <section id="profileScreen" class="screen">
      <div class="section-title">
        <p>profile</p>
        <h2>プロフィール</h2>
      </div>

      <div class="profile-box">
        <p>
          プロフィール編集はマイページに移動しました。
        </p>

        <a href="/account/" class="primary-btn profile-account-link">
          マイページへ
        </a>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button type="button" id="bottomHomeBtn">games</button>
    <button type="button" id="bottomRankingBtn">ranking</button>
    <button type="button" id="bottomProfileBtn">account</button>
  </nav>

  <div id="siteFooter"></div>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/auth.js"></script>
  <script type="module" src="./home.js"></script>

</body>
</html>
