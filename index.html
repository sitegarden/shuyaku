<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Mini Game Arena</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="appHeader">
  <div class="top-bar">
    <button id="headerBackBtn" class="hidden">←</button>

    <div class="header-title">
      <h1 id="headerTitle">Mini Game Arena</h1>
      <p id="headerSubtitle">好きなゲームを選んでスコアを競え</p>
    </div>

    <button id="headerActionBtn" class="hidden">ランキング</button>
  </div>

  <div id="headerUserArea">
    <p id="userName">ゲストプレイ中</p>
  </div>
</header>
<main>

  <section id="homeScreen" class="screen active">
    <h2>ゲームを選ぶ</h2>
    <div id="gameList"></div>
  </section>

  <section id="gameScreen" class="screen">
    <div class="screen-header">
      <button id="backHomeBtn">←</button>
      <h2 id="gameTitle"></h2>
      <button id="openRankingBtn">ランキング</button>
    </div>

    <div id="gameContainer"></div>
  </section>

  <section id="rankingScreen" class="screen">
    <div class="screen-header">
      <button id="backGameBtn">←</button>
      <h2>ランキング</h2>
    </div>

    <div class="tabs">
      <button data-period="week">今週</button>
      <button data-period="month">今月</button>
      <button data-period="all">全体</button>
    </div>

    <div id="rankingArea"></div>
  </section>

  <section id="profileScreen" class="screen">
    <div class="screen-header">
      <button id="backHomeFromProfileBtn">←</button>
      <h2>プロフィール</h2>
    </div>

    <!-- ここにプロフィール欄を入れる -->
  </section>

</main>

<nav class="bottom-nav">
  <button id="navHomeBtn">ホーム</button>
  <button id="navProfileBtn">プロフィール</button>
</nav>

  <script type="module" src="auth.js"></script>
  <script type="module" src="profile.js"></script>
  <script type="module" src="home.js"></script>
</body>
</html>
