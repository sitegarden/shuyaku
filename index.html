<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Game Arena | shuyaku.me</title>
<meta name="description" content="好きなミニゲームを選んでスコアを競える、ランキング付きゲームサイト。">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">

<meta property="og:type" content="website">
<meta property="og:title" content="Mini Game Arena | shuyaku.me">
<meta property="og:description" content="好きなミニゲームを選んでスコアを競え。2048、Tap Rush、sunvaderで上位を目指そう。">
<meta property="og:url" content="https://shuyaku.me/">
<meta property="og:site_name" content="Mini Game Arena">
<meta property="og:image" content="https://shuyaku.me/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Mini Game Arena | shuyaku.me">
<meta name="twitter:description" content="好きなミニゲームを選んでスコアを競え。2048、Tap Rush、sunvaderで上位を目指そう。">
<meta name="twitter:image" content="https://shuyaku.me/ogp.png">

<meta name="theme-color" content="#2f2929">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="appHeader">
  <div class="top-bar">
    <button id="headerBackBtn" class="hidden">←</button>

    <div class="header-title">
      <h1 id="headerTitle">Mini Game Arena</h1>
      <p id="headerSubtitle">好きなゲームを選んでスコアを競え</p>
    </div>

    <button id="headerActionBtn" class="hidden">ランキング</button>
  </div>

  <div id="headerUserArea">
    <p id="userName">ゲストプレイ中</p>
  </div>
</header>
<main>

  <section id="homeScreen" class="screen active">
    <h2>ゲームを選ぶ</h2>
    <div id="gameList"></div>
  </section>

 <section id="gameScreen" class="screen">
  <div id="gameContainer"></div>
</section>

<section id="rankingScreen" class="screen">
  <div class="tabs">
    <button data-period="week">今週</button>
    <button data-period="month">今月</button>
    <button data-period="all">全体</button>
  </div>

  <div id="rankingArea"></div>
</section>

  <section id="rankingScreen" class="screen">
    <div class="screen-header">
      <button id="backGameBtn">←</button>
      <h2>ランキング</h2>
    </div>

    <div class="tabs">
      <button data-period="week">今週</button>
      <button data-period="month">今月</button>
      <button data-period="all">全体</button>
    </div>

    <div id="rankingArea"></div>
  </section>

  <section id="profileScreen" class="screen">
  <div id="loginArea" class="profile-box">
    <h2>ログイン</h2>

    <input id="emailInput" type="email" placeholder="メールアドレス">
    <input id="passwordInput" type="password" placeholder="パスワード">
    <input id="displayNameInput" type="text" placeholder="表示名 ※新規登録時">

    <button id="registerBtn">新規登録</button>
    <button id="emailLoginBtn">メールでログイン</button>
    <button id="googleLoginBtn">Googleでログイン</button>
  </div>

  <section id="profileArea" class="hidden profile-box">
    <h2>プロフィール</h2>

    <input id="nicknameInput" type="text" placeholder="ニックネーム">

    <p class="profile-label">アイコン</p>

    <div class="avatar-preview">
      <div id="avatarPreview" class="avatar cat pink">
        <span class="ear left"></span>
        <span class="ear right"></span>
        <span class="face">
          <span class="eye left"></span>
          <span class="eye right"></span>
          <span class="mouth"></span>
        </span>
      </div>
    </div>

    <div class="avatar-options">
      <button class="avatarTypeBtn" data-type="round">まる</button>
      <button class="avatarTypeBtn" data-type="cat">ねこ</button>
      <button class="avatarTypeBtn" data-type="rabbit">うさぎ</button>
      <button class="avatarTypeBtn" data-type="bear">くま</button>
      <button class="avatarTypeBtn" data-type="mochi">もち</button>
    </div>

    <p class="profile-label">カラー</p>

    <div class="color-options">
      <button class="colorBtn pink" data-color="pink"></button>
      <button class="colorBtn cream" data-color="cream"></button>
      <button class="colorBtn mint" data-color="mint"></button>
      <button class="colorBtn blue" data-color="blue"></button>
      <button class="colorBtn purple" data-color="purple"></button>
      <button class="colorBtn brown" data-color="brown"></button>
    </div>

    <button id="saveProfileBtn">プロフィール保存</button>
  </section>

  <button id="logoutBtn" class="hidden">ログアウト</button>
</section>

</main>

<nav class="bottom-nav">
  <button id="navHomeBtn">ホーム</button>
  <button id="navProfileBtn">プロフィール</button>
</nav>

  <script type="module" src="auth.js"></script>
  <script type="module" src="profile.js"></script>
  <script type="module" src="home.js"></script>
</body>
</html>
