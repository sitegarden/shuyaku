<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>account | shuyaku.me</title>

  <link rel="icon" href="https://shuyaku.me/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="https://shuyaku.me/favicon.png">

  <meta property="og:site_name" content="shuyaku.me">
  <meta property="og:title" content="account | shuyaku.me">
  <meta property="og:description" content="shuyaku.me のアカウントページ">
  <meta property="og:image" content="https://shuyaku.me/ogp.png">
  <meta property="og:url" content="https://shuyaku.me/account/">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="account | shuyaku.me">
  <meta name="twitter:description" content="shuyaku.me のアカウントページ">
  <meta name="twitter:image" content="https://shuyaku.me/ogp.png">

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="siteHeader"></div>

  <main>
    <section class="account-page">
      <div class="section-title">
        <p>account</p>
        <h1>アカウント</h1>
      </div>

      <div class="account-card">

        <div id="guestArea">
          <h2>ログイン</h2>

          <p>
            Googleでログインすると、ランキングやプロフィールを
            shuyaku.me 共通アカウントで使えるようになります。
          </p>

          <button type="button" class="primary-btn account-main-btn" id="googleLoginBtn">
            Googleでログイン
          </button>
        </div>

        <div id="userArea" class="hidden">
          <div class="account-user">
            <div class="account-icon" id="userIcon">?</div>

            <div>
              <h2>マイページ</h2>
              <p class="account-status">
                <span id="userName">---</span>
              </p>
              <p class="account-email" id="userEmail"></p>
            </div>
          </div>

          <div class="account-edit">
            <label class="account-label" for="displayNameInput">
              表示名
            </label>

            <input
              type="text"
              id="displayNameInput"
              class="account-input"
              maxlength="16"
              placeholder="表示名を入力"
            >

            <p class="account-label">
              アイコン
            </p>

            <div class="icon-options" id="iconOptions"></div>

            <p class="account-message" id="accountMessage"></p>

            <button type="button" class="primary-btn account-main-btn" id="saveProfileBtn">
              保存する
            </button>
          </div>

          <div class="account-menu">
            <a href="/games/" class="secondary-btn account-main-btn">
              ゲームで遊ぶ
            </a>

            <button type="button" class="secondary-btn account-main-btn" id="logoutBtn">
              ログアウト
            </button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <div id="siteFooter"></div>

  <script type="module" src="/js/layout.js"></script>
  <script type="module" src="/js/auth.js"></script>

</body>
</html>
